<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Marx Chain - Blockchain Network</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #c41e3a; /* Scarlet red */
            --color-primary-light: #e63946; /* Lighter scarlet for hover */
            --color-background: #f5f5dc; /* Beige */
            --color-text: #2c3e50; /* Dark blue-gray for text */
            --color-header: #ffffff; /* White header background */
            --color-shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        /* Header styles */
        .header {
            background-color: var(--color-header);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--color-shadow);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        /* Logo styles */
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-primary);
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .logo:hover {
            color: var(--color-primary-light);
        }

        /* Navigation styles */
        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-menu ul {
            display: flex;
            gap: 2rem;
            list-style: none;
            padding: 0;
        }

        .nav-link {
            color: var(--color-text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--color-primary);
        }

        /* Burger menu styles */
        .burger-menu {
            display: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
        }

        .burger-menu span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: var(--color-text);
            margin: 5px 0;
            transition: all 0.3s ease;
            border-radius: 3px;
        }

        /* Mobile menu checkbox */
        #mobile-menu {
            display: none;
        }

        /* Responsive styles */
        @media screen and (max-width: 768px) {
            .burger-menu {
                display: block;
            }

            .nav-menu {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: var(--color-background);
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding: 5rem 1rem 1rem;
                gap: 2rem;
                box-shadow: 0 4px 6px var(--color-shadow);
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 999;
            }

            .nav-menu ul {
                flex-direction: column;
                gap: 2rem;
                width: 100%;
                align-items: center;
            }

            #mobile-menu:checked ~ .nav-menu {
                display: flex;
                transform: translateX(0);
            }

            .nav-link {
                width: 100%;
                text-align: center;
                font-size: 1.2rem;
                padding: 1rem;
                border-radius: 8px;
            }

            .nav-link:hover {
                background-color: rgba(198, 30, 58, 0.1);
            }

            /* Burger animation */
            #mobile-menu:checked ~ .burger-menu span:nth-child(1) {
                transform: rotate(45deg) translate(5px, 5px);
            }

            #mobile-menu:checked ~ .burger-menu span:nth-child(2) {
                opacity: 0;
            }

            #mobile-menu:checked ~ .burger-menu span:nth-child(3) {
                transform: rotate(-45deg) translate(7px, -6px);
            }
        }

        /* Main content placeholder */
        .main-content {
            margin-top: 80px;
            padding: 2rem;
            min-height: calc(100vh - 80px);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="/" class="logo">MCP Marx Chain</a>
            
            <input type="checkbox" id="mobile-menu" class="mobile-menu-checkbox">
            <label for="mobile-menu" class="burger-menu">
                <span></span>
                <span></span>
                <span></span>
            </label>
            <nav class="nav-menu">
                <ul>
                    <li><a href="#about" class="nav-link">About us</a></li>
                    <li><a href="#whitepaper" class="nav-link">WhitePaper</a></li>
                    <li><a href="#status" class="nav-link">Network Status</a></li>
                    <li><a href="#api" class="nav-link">API</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <!-- Main content will be added here -->
    </main>
</body>
</html>
